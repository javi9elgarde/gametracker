<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quitar fondo blanco — GameTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070f;
      color: #e8e8f8;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 1.4rem; color: #4facfe; letter-spacing: 0.05em; }
    .drop-zone {
      width: 340px;
      border: 2px dashed rgba(79,172,254,0.4);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(79,172,254,0.04);
    }
    .drop-zone:hover { border-color: #4facfe; background: rgba(79,172,254,0.08); }
    .drop-zone__icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .drop-zone__text { font-size: 0.9rem; color: rgba(232,232,248,0.6); }
    input[type=file] { display: none; }

    .controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 340px;
    }
    label.ctrl { font-size: 0.85rem; color: rgba(232,232,248,0.6); width: 100%; }
    input[type=range] { width: 100%; accent-color: #4facfe; }
    .val { color: #4facfe; font-weight: 700; }

    .previews {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-box { text-align: center; }
    .preview-box span { font-size: 0.75rem; color: rgba(232,232,248,0.4); display: block; margin-bottom: 0.4rem; }
    canvas {
      max-width: 200px;
      max-height: 320px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #canvasBefore { background: #fff; }
    #canvasAfter  { background: repeating-conic-gradient(#2a2a3a 0% 25%, #1a1a28 0% 50%) 0 0 / 16px 16px; }

    .btn-dl {
      display: none;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #07070f;
      font-weight: 900;
      font-size: 0.95rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .btn-dl:hover { opacity: 0.85; }
    .btn-reset {
      background: none;
      border: 1px solid rgba(232,232,248,0.2);
      color: rgba(232,232,248,0.5);
      padding: 0.4rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      display: none;
    }
    .btn-reset:hover { border-color: rgba(232,232,248,0.4); color: rgba(232,232,248,0.8); }
  </style>
</head>
<body>

<h1>🎨 Quitar fondo blanco — PNG Transparente</h1>

<div class="drop-zone" id="dropZone">
  <div class="drop-zone__icon">🖼️</div>
  <div class="drop-zone__text">Haz clic o arrastra tu PNG aquí</div>
  <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
</div>

<div class="controls" id="controls">
  <label class="ctrl">
    Tolerancia: <span class="val" id="tolVal">40</span>
    <br><small style="color:rgba(232,232,248,0.35)">Sube si quedan restos blancos · Baja si se recortan partes del personaje</small>
    <input type="range" id="tolRange" min="5" max="120" value="40">
  </label>
</div>

<div class="previews" id="previews" style="display:none">
  <div class="preview-box">
    <span>Original</span>
    <canvas id="canvasBefore"></canvas>
  </div>
  <div class="preview-box">
    <span>Sin fondo (sobre oscuro)</span>
    <canvas id="canvasAfter"></canvas>
  </div>
</div>

<a class="btn-dl" id="btnDl" download="sin-fondo.png">⬇ Descargar PNG sin fondo</a>
<button class="btn-reset" id="btnReset">← Cargar otra imagen</button>

<script>
  var originalImageData = null;
  var originalImg = null;
  var canvasBefore = document.getElementById('canvasBefore');
  var canvasAfter  = document.getElementById('canvasAfter');
  var ctxBefore    = canvasBefore.getContext('2d');
  var ctxAfter     = canvasAfter.getContext('2d');
  var tolRange     = document.getElementById('tolRange');
  var tolVal       = document.getElementById('tolVal');
  var btnDl        = document.getElementById('btnDl');
  var controls     = document.getElementById('controls');
  var previews     = document.getElementById('previews');
  var btnReset     = document.getElementById('btnReset');
  var dropZone     = document.getElementById('dropZone');

  // Click to open file
  dropZone.addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  // Drag & drop
  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.borderColor = '#4facfe'; });
  dropZone.addEventListener('dragleave', function()  { dropZone.style.borderColor = ''; });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.style.borderColor = '';
    var file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  document.getElementById('fileInput').addEventListener('change', function() {
    if (this.files[0]) loadFile(this.files[0]);
  });

  function loadFile(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        originalImg = img;
        // Draw original
        canvasBefore.width  = img.width;
        canvasBefore.height = img.height;
        ctxBefore.drawImage(img, 0, 0);

        // Store original pixel data
        originalImageData = ctxBefore.getImageData(0, 0, img.width, img.height);

        dropZone.style.display  = 'none';
        controls.style.display  = 'flex';
        previews.style.display  = 'flex';
        btnDl.style.display     = 'inline-block';
        btnReset.style.display  = 'inline-block';

        // Setup after canvas
        canvasAfter.width  = img.width;
        canvasAfter.height = img.height;

        // Set download filename from original
        btnDl.download = file.name.replace(/\.[^.]+$/, '') + '-transparente.png';

        applyRemoval();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function applyRemoval() {
    var tolerance = parseInt(tolRange.value);
    tolVal.textContent = tolerance;

    // Clone original data
    var src  = originalImageData.data;
    var dest = ctxAfter.createImageData(canvasAfter.width, canvasAfter.height);
    var d    = dest.data;

    for (var i = 0; i < src.length; i += 4) {
      var r = src[i], g = src[i+1], b = src[i+2], a = src[i+3];

      // Distance from white (255,255,255)
      var dist = Math.sqrt(
        Math.pow(255 - r, 2) +
        Math.pow(255 - g, 2) +
        Math.pow(255 - b, 2)
      );

      if (dist < tolerance) {
        // Fully transparent
        d[i] = r; d[i+1] = g; d[i+2] = b;
        d[i+3] = 0;
      } else if (dist < tolerance * 1.5) {
        // Semi-transparent edge (smooth transition)
        var alpha = Math.round(((dist - tolerance) / (tolerance * 0.5)) * 255);
        d[i] = r; d[i+1] = g; d[i+2] = b;
        d[i+3] = Math.min(alpha, a);
      } else {
        d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = a;
      }
    }

    ctxAfter.putImageData(dest, 0, 0);

    // Update download link
    btnDl.href = canvasAfter.toDataURL('image/png');
  }

  tolRange.addEventListener('input', applyRemoval);

  btnReset.addEventListener('click', function() {
    originalImageData = null;
    originalImg = null;
    dropZone.style.display  = '';
    controls.style.display  = 'none';
    previews.style.display  = 'none';
    btnDl.style.display     = 'none';
    btnReset.style.display  = 'none';
    document.getElementById('fileInput').value = '';
    tolRange.value = 40;
    tolVal.textContent = 40;
  });
</script>
</body>
</html>
